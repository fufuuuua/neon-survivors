<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NEON DRIFT · 霓虹幸存者</title>
  <style>
/* ============================================================
   NEON DRIFT — 全局样式与霓虹故障美术风格
   ============================================================ */

:root {
  --bg: #05060e;
  --neon-cyan: #00f0ff;
  --neon-magenta: #ff2bd6;
  --neon-violet: #8a5bff;
  --neon-lime: #aaff00;
  --ink: #e8f6ff;
  --panel: rgba(10, 14, 30, 0.82);
  --panel-border: rgba(0, 240, 255, 0.35);
  --font: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --mono: "JetBrains Mono", "Consolas", ui-monospace, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  user-select: none;
  -webkit-user-select: none;
  cursor: default;
}

#app {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#game {
  display: block;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 40%, #0b1230 0%, #05060e 70%);
  touch-action: none;            /* 禁用触摸默认手势（滚动/缩放），供虚拟摇杆使用 */
}

/* ---------- 屏幕叠加滤镜：扫描线 ---------- */
.fx-scanlines {
  pointer-events: none;
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0) 0px,
    rgba(0, 0, 0, 0) 2px,
    rgba(0, 0, 0, 0.18) 3px,
    rgba(0, 0, 0, 0) 4px
  );
  mix-blend-mode: multiply;
  z-index: 5;
}

/* ---------- 暗角 ---------- */
/* 暗角改由 canvas 在「游戏世界之上、HUD 之下」绘制，避免压住血条/经验条等 HUD。 */
.fx-vignette {
  display: none;
}

/* ---------- UI 根容器 ---------- */
#ui-root {
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}
#ui-root .screen { pointer-events: auto; }

/* ---------- 移动端屏上暂停按钮 ---------- */
.pause-fab {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 20;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: none;                 /* 由 JS 控制显隐 */
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--neon-cyan);
  background: rgba(10, 14, 30, 0.72);
  border: 1px solid var(--panel-border);
  box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
  cursor: pointer;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}
.pause-fab:active { background: rgba(0, 240, 255, 0.2); }

/* ---------- 通用霓虹文字 ---------- */
.neon-title {
  font-weight: 800;
  letter-spacing: 0.14em;
  color: #fff;
  text-shadow:
    0 0 6px var(--neon-cyan),
    0 0 18px var(--neon-cyan),
    0 0 38px var(--neon-magenta);
  animation: flicker 4.5s infinite;
}

@keyframes flicker {
  0%, 19%, 21%, 55%, 57%, 100% { opacity: 1; }
  20%, 56% { opacity: 0.72; }
}

/* ---------- 全屏覆盖界面 ---------- */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 22px;
  background: radial-gradient(circle at 50% 50%, rgba(8,10,24,0.6), rgba(3,4,10,0.94));
  backdrop-filter: blur(2px);
  animation: fadeIn 0.35s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.screen h1 { font-size: clamp(40px, 8vw, 96px); }
.screen h2 { font-size: clamp(22px, 4vw, 40px); letter-spacing: 0.1em; }
.screen .sub { color: #8fa9c8; letter-spacing: 0.22em; font-size: 14px; text-transform: uppercase; }

/* ---------- 按钮 ---------- */
.btn {
  pointer-events: auto;
  font-family: var(--mono);
  font-size: 18px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--neon-cyan);
  background: rgba(0, 240, 255, 0.06);
  border: 1px solid var(--panel-border);
  padding: 14px 40px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.16s ease;
  box-shadow: 0 0 0 rgba(0, 240, 255, 0);
}
.btn:hover {
  color: #fff;
  background: rgba(0, 240, 255, 0.16);
  box-shadow: 0 0 22px rgba(0, 240, 255, 0.55);
  transform: translateY(-1px);
}

/* ---------- 升级卡片 ---------- */
.cards { display: flex; gap: 22px; flex-wrap: wrap; justify-content: center; }
.card {
  pointer-events: auto;
  width: 230px;
  min-height: 250px;
  padding: 22px 18px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent, var(--neon-cyan));
  box-shadow: 0 0 16px var(--accent, var(--neon-cyan));
}
.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 26px var(--accent, var(--neon-cyan));
  border-color: var(--accent, var(--neon-cyan));
}
.card .icon { font-size: 46px; filter: drop-shadow(0 0 10px var(--accent, var(--neon-cyan))); }
.card .name { font-size: 19px; font-weight: 700; letter-spacing: 0.04em; color: #fff; }
.card .lvl { font-family: var(--mono); font-size: 12px; color: var(--accent, var(--neon-cyan)); letter-spacing: 0.1em; }
.card .desc { font-size: 13.5px; line-height: 1.55; color: #b6c8e0; }

/* ---------- 提示文字 ---------- */
.hint { font-family: var(--mono); font-size: 13px; color: #6f86a8; letter-spacing: 0.16em; }
.stat-line { font-family: var(--mono); font-size: 15px; color: #b6c8e0; letter-spacing: 0.08em; }
.stat-line b { color: var(--neon-lime); }

/* ---------- 升级界面布局：左侧能力总览 + 右侧卡片 ---------- */
.levelup-body {
  display: flex;
  gap: 28px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 1100px;
}

/* ---------- 当前能力总览面板 ---------- */
.loadout {
  pointer-events: auto;
  min-width: 280px;
  max-width: 340px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  padding: 16px 18px;
  text-align: left;
}
.lo-title {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--neon-cyan);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(0, 240, 255, 0.18);
}
.lo-sep {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #6f86a8;
  margin: 12px 0 6px;
}
.lo-row {
  display: grid;
  grid-template-columns: 22px 1fr;
  grid-template-areas: "icon name" "icon detail";
  column-gap: 10px;
  padding: 5px 0;
}
.lo-icon { grid-area: icon; align-self: center; font-size: 18px; text-align: center; }
.lo-name { grid-area: name; font-size: 14px; font-weight: 700; color: #fff; }
.lo-detail { grid-area: detail; font-family: var(--mono); font-size: 11.5px; color: #9fb4d2; line-height: 1.3; }

/* ---------- 升级卡片：等级圆点 ---------- */
.pips { display: flex; gap: 5px; margin-top: 4px; }
.pip {
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 1.5px solid;
  box-sizing: border-box;
}

/* ---------- 元进度：货币 / 记录 / 菜单按钮 ---------- */
.cores-balance {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 0.04em;
  display: flex;
  align-items: baseline;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px 16px;
}
/* 单个货币单元：数值 + 标签基线对齐 */
.cores-balance .cur { display: inline-flex; align-items: baseline; gap: 6px; }
/* 暗物质核心：品红高亮 */
.cores-balance .cur-core { color: var(--neon-magenta); text-shadow: 0 0 12px var(--neon-magenta); }
/* 两种货币之间的分隔符 */
.cores-balance .cur-sep { color: #52627e; font-weight: 400; font-size: 18px; }
/* 货币文字标签：小号、低饱和，不与数值抢视觉 */
.cores-balance .lbl {
  font-size: 13px;
  font-weight: 400;
  color: #8fa9c8;
  letter-spacing: 0.18em;
  text-shadow: none;
}

.best-row {
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
  justify-content: center;
  font-family: var(--mono);
  font-size: 13px;
  color: #8fa9c8;
  letter-spacing: 0.06em;
}
.best-row b { color: var(--neon-cyan); }

.menu-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.btn.btn-2 { color: var(--neon-magenta); border-color: rgba(255, 43, 214, 0.4); background: rgba(255, 43, 214, 0.06); }
.btn.btn-2:hover { color: #fff; background: rgba(255, 43, 214, 0.16); box-shadow: 0 0 22px rgba(255, 43, 214, 0.55); }
.btn.btn-3 { color: var(--neon-violet); border-color: rgba(138, 91, 255, 0.4); background: rgba(138, 91, 255, 0.06); }
.btn.btn-3:hover { color: #fff; background: rgba(138, 91, 255, 0.16); box-shadow: 0 0 22px rgba(138, 91, 255, 0.55); }
.btn.btn-4 { color: var(--neon-lime); border-color: rgba(170, 255, 0, 0.4); background: rgba(170, 255, 0, 0.06); }
.btn.btn-4:hover { color: #fff; background: rgba(170, 255, 0, 0.16); box-shadow: 0 0 22px rgba(170, 255, 0, 0.55); }
/* 危险操作按钮（结束本局等）：暗红弱化，避免误当作主操作 */
.btn.btn-quit { color: #ff6b7d; border-color: rgba(255, 107, 125, 0.4); background: rgba(255, 107, 125, 0.05); }
.btn.btn-quit:hover { color: #fff; background: rgba(255, 107, 125, 0.16); box-shadow: 0 0 22px rgba(255, 107, 125, 0.5); }

/* ---------- 结算：破纪录标签 / 收益 ---------- */
.rec {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--neon-lime);
  text-shadow: 0 0 8px var(--neon-lime);
  letter-spacing: 0.1em;
}
.reward-box {
  font-family: var(--mono);
  font-size: 16px;
  color: #b6c8e0;
  letter-spacing: 0.06em;
  padding: 10px 22px;
  border: 1px solid rgba(255, 43, 214, 0.35);
  border-radius: 8px;
  background: rgba(255, 43, 214, 0.06);
}
.reward-box b { color: var(--neon-magenta); font-size: 19px; }

/* ---------- 强化实验室商店 ---------- */
.shop-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: min(560px, 90vw);
  max-height: 56vh;
  overflow-y: auto;
  padding: 4px;
}
.shop-row {
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-left: 4px solid var(--accent, var(--neon-cyan));
  border-radius: 8px;
  text-align: left;
}
.shop-icon {
  font-size: 30px;
  color: var(--accent, var(--neon-cyan));
  filter: drop-shadow(0 0 8px var(--accent, var(--neon-cyan)));
  width: 36px;
  text-align: center;
}
.shop-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.shop-name { font-size: 16px; font-weight: 700; color: #fff; }
.shop-lv { font-family: var(--mono); font-size: 12px; color: var(--accent, var(--neon-cyan)); margin-left: 6px; }
.shop-effect { font-family: var(--mono); font-size: 12.5px; color: #9fb4d2; }
.shop-buy {
  pointer-events: auto;
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--neon-magenta);
  background: rgba(255, 43, 214, 0.08);
  border: 1px solid rgba(255, 43, 214, 0.45);
  border-radius: 6px;
  padding: 10px 18px;
  cursor: pointer;
  min-width: 78px;
  transition: all 0.15s ease;
}
.shop-buy:hover:not(:disabled) {
  color: #fff;
  background: rgba(255, 43, 214, 0.2);
  box-shadow: 0 0 16px rgba(255, 43, 214, 0.5);
}
.shop-buy.poor { color: #6f86a8; border-color: rgba(143, 169, 200, 0.25); background: transparent; cursor: not-allowed; }
.shop-buy.maxed { color: var(--neon-lime); border-color: rgba(170, 255, 0, 0.4); background: rgba(170, 255, 0, 0.06); cursor: default; }

/* ---------- 棱牌货币色（机库/抽卡专用） ---------- */
.shard-amt { color: var(--neon-lime); text-shadow: 0 0 12px var(--neon-lime); }

/* ---------- 机库：抽卡按钮栏 ---------- */
.gacha-bar { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.gacha-btn { font-size: 16px; padding: 12px 30px; }
.btn.poor, .btn:disabled { color: #6f86a8; border-color: rgba(143, 169, 200, 0.25); background: transparent; cursor: not-allowed; box-shadow: none; transform: none; }
.btn.poor:hover, .btn:disabled:hover { color: #6f86a8; background: transparent; box-shadow: none; transform: none; }

/* 每日免费抽卡按钮：柠檬绿高亮，与棱牌货币色呼应 */
.btn.free-draw {
  color: var(--neon-lime);
  border-color: rgba(170, 255, 0, 0.5);
  background: rgba(170, 255, 0, 0.08);
  font-size: 16px;
  padding: 12px 30px;
}
.btn.free-draw:hover { color: #fff; background: rgba(170, 255, 0, 0.2); box-shadow: 0 0 22px rgba(170, 255, 0, 0.55); }
.btn.free-draw.claimed { color: #6f86a8; border-color: rgba(143, 169, 200, 0.25); background: transparent; box-shadow: none; }
.btn.free-draw.claimed:hover { color: #6f86a8; background: transparent; box-shadow: none; transform: none; }

/* ---------- 机库：外观网格 ---------- */
.skin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
  width: min(880px, 92vw);
  max-height: 54vh;
  overflow-y: auto;
  padding: 6px;
}
.skin-card {
  pointer-events: auto;
  position: relative;
  background: var(--panel);
  border: 1px solid rgba(143, 169, 200, 0.25);
  border-radius: 10px;
  padding: 14px 12px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  overflow: hidden;
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s;
}
.skin-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent, var(--neon-cyan));
  box-shadow: 0 0 14px var(--accent, var(--neon-cyan));
}
.skin-card:hover { transform: translateY(-4px); border-color: var(--accent, var(--neon-cyan)); box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 0 18px var(--accent, var(--neon-cyan)); }
.skin-card.locked { opacity: 0.72; }
.skin-card.selected { border-color: var(--accent, var(--neon-cyan)); box-shadow: 0 0 22px var(--accent, var(--neon-cyan)); }
.skin-canvas { width: 96px; height: 96px; }
.skin-rar { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; }
.skin-name { font-size: 16px; font-weight: 700; color: #fff; }
.skin-stars { font-size: 14px; letter-spacing: 0.08em; }
.skin-perk { font-family: var(--mono); font-size: 11px; line-height: 1.4; color: #9fb4d2; min-height: 30px; }
.skin-action { margin-top: 4px; min-height: 30px; display: flex; align-items: center; }
.skin-select {
  pointer-events: auto;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--neon-cyan);
  background: rgba(0, 240, 255, 0.08);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  padding: 6px 20px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.skin-select:hover { color: #fff; background: rgba(0, 240, 255, 0.2); box-shadow: 0 0 14px rgba(0, 240, 255, 0.5); }
.skin-equipped { font-family: var(--mono); font-size: 13px; color: var(--neon-lime); letter-spacing: 0.1em; }
.skin-lockicon { font-size: 16px; opacity: 0.6; }

/* 稀有度描边强调 */
.rar-rare { --accent: #00f0ff; }
.rar-epic { --accent: #b06bff; }
.rar-legendary { --accent: #ffd23f; }
.rar-common { --accent: #8fa9c8; }

/* ---------- 抽卡结果 ---------- */
.gacha-result {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 14px;
  width: min(680px, 92vw);
  max-height: 56vh;
  overflow-y: auto;
  padding: 6px;
}
.gr-cell {
  position: relative;
  background: var(--panel);
  border: 1px solid var(--accent, var(--neon-cyan));
  border-radius: 10px;
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  box-shadow: 0 0 16px color-mix(in srgb, var(--accent, #00f0ff) 40%, transparent);
  animation: grPop 0.4s ease backwards;
}
@keyframes grPop { from { opacity: 0; transform: scale(0.7) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.gr-canvas { width: 84px; height: 84px; }
.gr-rar { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
.gr-name { font-size: 14px; font-weight: 700; color: #fff; }
.gr-tag { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 10px; letter-spacing: 0.06em; }
.gr-tag.new { color: var(--bg); background: var(--neon-lime); font-weight: 700; }
.gr-tag.up { color: var(--neon-cyan); border: 1px solid rgba(0,240,255,0.5); }
.gr-tag.refund { color: #8fa9c8; border: 1px solid rgba(143,169,200,0.4); }

/* ============================================================
   移动端 / 小屏 响应式适配
   - 覆盖界面允许滚动，避免内容超出被裁切
   - 升级卡片纵向占屏排列；按钮加大便于触摸
   ============================================================ */
@media (max-width: 760px), (max-height: 560px) {
  .screen {
    justify-content: flex-start;
    padding: 18px 12px 32px;
    gap: 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  /* 首页内容较短，移动端保持垂直居中；若内容超高则自动从顶部滚动 */
  .screen.menu-screen {
    justify-content: center;
    padding: 24px 12px;
  }
  /* 暂停界面：移动端垂直居中 */
  .screen.pause-screen {
    justify-content: center;
    padding: 24px 12px;
  }
  .screen h1 { font-size: clamp(34px, 12vw, 58px); }
  .screen h2 { font-size: clamp(20px, 6vw, 30px); }

  /* 升级界面：能力面板 + 卡片改为纵向 */
  .levelup-body { flex-direction: column; align-items: center; gap: 12px; width: 100%; }
  .loadout { width: min(92vw, 420px); max-width: 92vw; min-width: 0; }
  .cards { gap: 12px; width: 100%; align-items: center; }
  .card { width: min(92vw, 360px); min-height: auto; padding: 16px; }
  .card .icon { font-size: 38px; }
  .card .desc { font-size: 13px; }

  /* 商店列表 */
  .shop-list { width: 92vw; max-height: 58vh; }
  .shop-name { font-size: 15px; }
  .shop-effect { font-size: 12px; }

  /* 机库：外观网格 + 抽卡结果 */
  .skin-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); width: 92vw; max-height: 50vh; gap: 12px; }
  .skin-canvas { width: 84px; height: 84px; }
  .gacha-bar { width: 100%; flex-direction: column; align-items: center; }
  .gacha-btn { width: min(92vw, 360px); }
  .gacha-result { width: 92vw; }

  /* 菜单/结算按钮：大号竖排，触摸友好 */
  .menu-btns { width: 100%; flex-direction: column; align-items: center; gap: 12px; }
  .btn { width: min(92vw, 360px); padding: 14px 24px; }
  .best-row { font-size: 12px; gap: 10px 16px; }
