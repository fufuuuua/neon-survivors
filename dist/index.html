<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NEON DRIFT · 霓虹幸存者</title>
  <style>
/* ============================================================
   NEON DRIFT — 全局样式与霓虹故障美术风格
   ============================================================ */

:root {
  --bg: #05060e;
  --neon-cyan: #00f0ff;
  --neon-magenta: #ff2bd6;
  --neon-violet: #8a5bff;
  --neon-lime: #aaff00;
  --ink: #e8f6ff;
  --panel: rgba(10, 14, 30, 0.82);
  --panel-border: rgba(0, 240, 255, 0.35);
  --font: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --mono: "JetBrains Mono", "Consolas", ui-monospace, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  user-select: none;
  -webkit-user-select: none;
  cursor: default;
  overscroll-behavior: none;     /* 禁止边缘回弹/联动滚动 */
  touch-action: manipulation;    /* 禁用双击缩放（保留单击/滚动） */
}

#app {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#game {
  display: block;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 40%, #0b1230 0%, #05060e 70%);
  touch-action: none;            /* 禁用触摸默认手势（滚动/缩放），供虚拟摇杆使用 */
}

/* ---------- 屏幕叠加滤镜：扫描线 ---------- */
.fx-scanlines {
  pointer-events: none;
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0) 0px,
    rgba(0, 0, 0, 0) 2px,
    rgba(0, 0, 0, 0.18) 3px,
    rgba(0, 0, 0, 0) 4px
  );
  mix-blend-mode: multiply;
  z-index: 5;
}

/* ---------- 暗角 ---------- */
/* 暗角改由 canvas 在「游戏世界之上、HUD 之下」绘制，避免压住血条/经验条等 HUD。 */
.fx-vignette {
  display: none;
}

/* ---------- UI 根容器 ---------- */
#ui-root {
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}
#ui-root .screen { pointer-events: auto; }

/* ---------- 移动端屏上暂停按钮 ---------- */
.pause-fab {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 20;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: none;                 /* 由 JS 控制显隐 */
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--neon-cyan);
  background: rgba(10, 14, 30, 0.72);
  border: 1px solid var(--panel-border);
  box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
  cursor: pointer;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}
.pause-fab:active { background: rgba(0, 240, 255, 0.2); }

/* ---------- 移动端屏上主动技能按钮 ---------- */
.skill-fab {
  position: absolute;
  right: 18px;
  bottom: 96px;
  z-index: 20;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  display: none;                 /* 由 JS 控制显隐, 仅装备主动皮肤时出现 */
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 2px;
  color: #7df9ff;
  background: rgba(10, 14, 30, 0.78);
  border: 1.5px solid rgba(125, 249, 255, 0.55);
  box-shadow: 0 0 14px rgba(125, 249, 255, 0.5);
  cursor: pointer;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--mono);
}
.skill-fab .sf-ic { font-size: 22px; line-height: 1; font-weight: 700; }
.skill-fab .sf-cd { font-size: 10px; letter-spacing: 0.06em; }
.skill-fab.cooldown { color: #3a4356; border-color: #3a4356; box-shadow: none; }
.skill-fab:active { background: rgba(125, 249, 255, 0.2); }

/* ---------- 通用霓虹文字 ---------- */
.neon-title {
  font-weight: 800;
  letter-spacing: 0.14em;
  color: #fff;
  text-shadow:
    0 0 6px var(--neon-cyan),
    0 0 18px var(--neon-cyan),
    0 0 38px var(--neon-magenta);
  animation: flicker 4.5s infinite;
}

@keyframes flicker {
  0%, 19%, 21%, 55%, 57%, 100% { opacity: 1; }
  20%, 56% { opacity: 0.72; }
}

/* ---------- 全屏覆盖界面 ---------- */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 22px;
  background: radial-gradient(circle at 50% 50%, rgba(8,10,24,0.6), rgba(3,4,10,0.94));
  backdrop-filter: blur(2px);
  animation: fadeIn 0.35s ease;
  touch-action: manipulation;    /* 界面层禁用双击缩放，保留点击与滚动 */
}
/* 图鉴屏幕关闭 backdrop-filter: 装备切换时任何子节点变化都会让浏览器重算整块背板模糊,
   在深色主题下视觉上表现为"整屏闪一下". 机库/强化实验室背景本身已是深色渐变, 关掉模糊不影响观感. */
.screen.hangar-screen,
.screen.shop-screen,
.screen.codex-screen,
.screen.cloud-screen,
.screen.rank-screen { backdrop-filter: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.screen h1 { font-size: clamp(40px, 8vw, 96px); }
.screen h2 { font-size: clamp(22px, 4vw, 40px); letter-spacing: 0.1em; }
.screen .sub { color: #8fa9c8; letter-spacing: 0.22em; font-size: 14px; text-transform: uppercase; }

/* ---------- 按钮 ---------- */
.btn {
  pointer-events: auto;
  font-family: var(--mono);
  font-size: 18px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--neon-cyan);
  background: rgba(0, 240, 255, 0.06);
  border: 1px solid var(--panel-border);
  padding: 14px 40px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.16s ease;
  box-shadow: 0 0 0 rgba(0, 240, 255, 0);
}
.btn:hover {
  color: #fff;
  background: rgba(0, 240, 255, 0.16);
  box-shadow: 0 0 22px rgba(0, 240, 255, 0.55);
  transform: translateY(-1px);
}

/* ---------- 升级卡片 ---------- */
.cards { display: flex; gap: 22px; flex-wrap: wrap; justify-content: center; }
.card {
  pointer-events: auto;
  width: 230px;
  min-height: 250px;
  padding: 22px 18px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent, var(--neon-cyan));
  box-shadow: 0 0 16px var(--accent, var(--neon-cyan));
}
.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 26px var(--accent, var(--neon-cyan));
  border-color: var(--accent, var(--neon-cyan));
}
.card .icon { font-size: 46px; filter: drop-shadow(0 0 10px var(--accent, var(--neon-cyan))); }
.card .name { font-size: 19px; font-weight: 700; letter-spacing: 0.04em; color: #fff; }
.card .lvl { font-family: var(--mono); font-size: 12px; color: var(--accent, var(--neon-cyan)); letter-spacing: 0.1em; }
.card .desc { font-size: 13.5px; line-height: 1.55; color: #b6c8e0; }

/* ---------- 提示文字 ---------- */
.hint { font-family: var(--mono); font-size: 13px; color: #6f86a8; letter-spacing: 0.16em; }
.stat-line { font-family: var(--mono); font-size: 15px; color: #b6c8e0; letter-spacing: 0.08em; }
.stat-line b { color: var(--neon-lime); }

/* ---------- 升级界面布局：左侧能力总览 + 右侧卡片 ---------- */
.levelup-body {
  display: flex;
  gap: 28px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 1100px;
}

/* ---------- 当前能力总览面板 ---------- */
.loadout {
  pointer-events: auto;
  min-width: 280px;
  max-width: 340px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  padding: 16px 18px;
  text-align: left;
}
.lo-title {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--neon-cyan);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(0, 240, 255, 0.18);
}
.lo-sep {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #6f86a8;
  margin: 12px 0 6px;
}
.lo-row {
  display: grid;
  grid-template-columns: 22px 1fr;
  grid-template-areas: "icon name" "icon detail";
  column-gap: 10px;
  padding: 5px 0;
}
.lo-icon { grid-area: icon; align-self: center; font-size: 18px; text-align: center; }
.lo-name { grid-area: name; font-size: 14px; font-weight: 700; color: #fff; }
.lo-detail { grid-area: detail; font-family: var(--mono); font-size: 11.5px; color: #9fb4d2; line-height: 1.3; }

/* ---------- 升级卡片：等级圆点 ---------- */
.pips { display: flex; gap: 5px; margin-top: 4px; }
.pip {
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 1.5px solid;
  box-sizing: border-box;
}

/* ---------- 元进度：货币 / 记录 / 菜单按钮 ---------- */
.cores-balance {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 0.04em;
  display: flex;
  align-items: baseline;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px 16px;
}
/* 单个货币单元：数值 + 标签基线对齐 */
.cores-balance .cur { display: inline-flex; align-items: baseline; gap: 6px; }
/* 暗物质核心：紫色高亮, 与强化实验室按钮 (btn-3) 保持视觉一致, 呼应"花核心买强化"的语义 */
.cores-balance .cur-core { color: var(--neon-violet); text-shadow: 0 0 12px var(--neon-violet); }
/* 两种货币之间的分隔符 */
.cores-balance .cur-sep { color: #52627e; font-weight: 400; font-size: 18px; }
/* 货币文字标签：小号、低饱和，不与数值抢视觉 */
.cores-balance .lbl {
  font-size: 13px;
  font-weight: 400;
  color: #8fa9c8;
  letter-spacing: 0.18em;
  text-shadow: none;
}

.best-row {
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
  justify-content: center;
  font-family: var(--mono);
  font-size: 13px;
  color: #8fa9c8;
  letter-spacing: 0.06em;
}
.best-row b { color: var(--neon-cyan); }

.menu-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
/* 主行动按钮: 品红, 用于「开始游戏」/「继续上局」 */
.btn.btn-primary { color: var(--neon-magenta); border-color: rgba(255, 43, 214, 0.45); background: rgba(255, 43, 214, 0.06); }
.btn.btn-primary:hover { color: #fff; background: rgba(255, 43, 214, 0.18); box-shadow: 0 0 22px rgba(255, 43, 214, 0.6); }
/* 次要开始按钮: 青, 用于「重新开始」(存在续玩快照时视觉降级, 与"继续上局"拉开层级) */
.btn.btn-restart { color: var(--neon-cyan); border-color: rgba(0, 240, 255, 0.4); background: rgba(0, 240, 255, 0.06); }
.btn.btn-restart:hover { color: #fff; background: rgba(0, 240, 255, 0.18); box-shadow: 0 0 22px rgba(0, 240, 255, 0.55); }
.btn.btn-2 { color: var(--neon-magenta); border-color: rgba(255, 43, 214, 0.4); background: rgba(255, 43, 214, 0.06); }
.btn.btn-2:hover { color: #fff; background: rgba(255, 43, 214, 0.16); box-shadow: 0 0 22px rgba(255, 43, 214, 0.55); }
.btn.btn-3 { color: var(--neon-violet); border-color: rgba(138, 91, 255, 0.4); background: rgba(138, 91, 255, 0.06); }
.btn.btn-3:hover { color: #fff; background: rgba(138, 91, 255, 0.16); box-shadow: 0 0 22px rgba(138, 91, 255, 0.55); }
.btn.btn-4 { color: var(--neon-lime); border-color: rgba(170, 255, 0, 0.4); background: rgba(170, 255, 0, 0.06); }
.btn.btn-4:hover { color: #fff; background: rgba(170, 255, 0, 0.16); box-shadow: 0 0 22px rgba(170, 255, 0, 0.55); }
/* 图鉴按钮: 琥珀橙, 与"开始游戏"(青)/机库(柠檬绿)/强化实验室(紫) 明显区分 */
.btn.btn-codex { color: #ff8a3d; border-color: rgba(255, 138, 61, 0.45); background: rgba(255, 138, 61, 0.06); }
.btn.btn-codex:hover { color: #fff; background: rgba(255, 138, 61, 0.18); box-shadow: 0 0 22px rgba(255, 138, 61, 0.6); }
/* 危险操作按钮（结束本局等）：暗红弱化，避免误当作主操作 */
.btn.btn-quit { color: #ff6b7d; border-color: rgba(255, 107, 125, 0.4); background: rgba(255, 107, 125, 0.05); }
.btn.btn-quit:hover { color: #fff; background: rgba(255, 107, 125, 0.16); box-shadow: 0 0 22px rgba(255, 107, 125, 0.5); }

/* ---------- 结算：破纪录标签 / 收益 ---------- */
.rec {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--neon-lime);
  text-shadow: 0 0 8px var(--neon-lime);
  letter-spacing: 0.1em;
}
.reward-box {
  font-family: var(--mono);
  font-size: 16px;
  color: #b6c8e0;
  letter-spacing: 0.06em;
  padding: 10px 22px;
  border: 1px solid rgba(255, 43, 214, 0.35);
  border-radius: 8px;
  background: rgba(255, 43, 214, 0.06);
}
.reward-box b { color: var(--neon-magenta); font-size: 19px; }
/* 两种货币在结算收益里各自使用主题色, 避免撞色（提高优先级覆盖上面的默认 b 规则） */
.reward-box b.cur-core { color: var(--neon-magenta); text-shadow: 0 0 12px var(--neon-magenta); }
.reward-box b.shard-amt { color: var(--neon-lime); text-shadow: 0 0 12px var(--neon-lime); }

/* ---------- 强化实验室商店 ---------- */
.shop-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: min(560px, 90vw);
  max-height: 56vh;
  overflow-y: auto;
  padding: 4px;
}
.shop-row {
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-left: 4px solid var(--accent, var(--neon-cyan));
  border-radius: 8px;
  text-align: left;
}
.shop-icon {
  font-size: 30px;
  color: var(--accent, var(--neon-cyan));
  filter: drop-shadow(0 0 8px var(--accent, var(--neon-cyan)));
  width: 36px;
  text-align: center;
}
.shop-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.shop-name { font-size: 16px; font-weight: 700; color: #fff; }
.shop-lv { font-family: var(--mono); font-size: 12px; color: var(--accent, var(--neon-cyan)); margin-left: 6px; }
.shop-effect { font-family: var(--mono); font-size: 12.5px; color: #9fb4d2; }
.shop-buy {
  pointer-events: auto;
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--neon-magenta);
  background: rgba(255, 43, 214, 0.08);
  border: 1px solid rgba(255, 43, 214, 0.45);
  border-radius: 6px;
  padding: 10px 18px;
  cursor: pointer;
  min-width: 78px;
  transition: all 0.15s ease;
}
.shop-buy:hover:not(:disabled) {
  color: #fff;
  background: rgba(255, 43, 214, 0.2);
  box-shadow: 0 0 16px rgba(255, 43, 214, 0.5);
}
.shop-buy.poor { color: #6f86a8; border-color: rgba(143, 169, 200, 0.25); background: transparent; cursor: not-allowed; }
.shop-buy.maxed { color: var(--neon-lime); border-color: rgba(170, 255, 0, 0.4); background: rgba(170, 255, 0, 0.06); cursor: default; }

/* ---------- 棱牌货币色（机库/抽卡专用） ---------- */
.shard-amt { color: var(--neon-lime); text-shadow: 0 0 12px var(--neon-lime); }

/* ---------- 机库：抽卡按钮栏 ---------- */
.gacha-bar { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.gacha-btn { font-size: 16px; padding: 12px 30px; }
.btn.poor, .btn:disabled { color: #6f86a8; border-color: rgba(143, 169, 200, 0.25); background: transparent; cursor: not-allowed; box-shadow: none; transform: none; }
.btn.poor:hover, .btn:disabled:hover { color: #6f86a8; background: transparent; box-shadow: none; transform: none; }

/* 每日免费抽卡按钮：柠檬绿高亮，与棱牌货币色呼应 */
.btn.free-draw {
  color: var(--neon-lime);
  border-color: rgba(170, 255, 0, 0.5);
  background: rgba(170, 255, 0, 0.08);
  font-size: 16px;
  padding: 12px 30px;
}
.btn.free-draw:hover { color: #fff; background: rgba(170, 255, 0, 0.2); box-shadow: 0 0 22px rgba(170, 255, 0, 0.55); }
.btn.free-draw.claimed { color: #6f86a8; border-color: rgba(143, 169, 200, 0.25); background: transparent; box-shadow: none; }
.btn.free-draw.claimed:hover { color: #6f86a8; background: transparent; box-shadow: none; transform: none; }

/* ---------- 机库：外观网格 ---------- */
.skin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
  width: min(880px, 92vw);
  max-height: 54vh;
  overflow-y: auto;
  padding: 6px;
}
.skin-card {
  pointer-events: auto;
  position: relative;
  background: var(--panel);
  border: 1px solid rgba(143, 169, 200, 0.25);
  border-radius: 10px;
  padding: 14px 12px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  overflow: hidden;
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s;
}
.skin-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent, var(--neon-cyan));
  box-shadow: 0 0 14px var(--accent, var(--neon-cyan));
}
.skin-card:hover { transform: translateY(-4px); border-color: var(--accent, var(--neon-cyan)); box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 0 18px var(--accent, var(--neon-cyan)); }
.skin-card.locked { opacity: 0.72; }
.skin-card.selected { border-color: var(--accent, var(--neon-cyan)); box-shadow: 0 0 22px var(--accent, var(--neon-cyan)); }
.skin-canvas { width: 96px; height: 96px; }
.skin-rar { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; }
.skin-name { font-size: 16px; font-weight: 700; color: #fff; }
.skin-stars { font-size: 14px; letter-spacing: 0.08em; }
.skin-perk { font-family: var(--mono); font-size: 11px; line-height: 1.4; color: #9fb4d2; min-height: 30px; }
.skin-action { margin-top: 4px; min-height: 30px; display: flex; align-items: center; justify-content: center; }
.skin-select {
  pointer-events: auto;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--neon-cyan);
  background: rgba(0, 240, 255, 0.08);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  padding: 6px 20px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.skin-select:hover { color: #fff; background: rgba(0, 240, 255, 0.2); box-shadow: 0 0 14px rgba(0, 240, 255, 0.5); }
/* 已装备态: 复用同一 button 节点, 只切文案+配色, 避免 DOM 结构变动 */
.skin-select.equipped {
  color: var(--neon-lime);
  background: transparent;
  border-color: transparent;
  letter-spacing: 0.1em;
  cursor: default;
  box-shadow: none;
}
.skin-select.equipped:hover { color: var(--neon-lime); background: transparent; box-shadow: none; }
.skin-lockicon { font-size: 16px; opacity: 0.6; }

/* 稀有度描边强调 */

 *
 * 每位玩家拥有一个稳定的 userId（默认为 8 位随机字母数字，可由玩家自定义），

 *  - 用户输入的 ID / 昵称做严格的字符与长度校验，避免注入奇怪的 key。
 *  - 读写只经 JSON.parse / JSON.stringify，绝不 eval 或反序列化任意对象。

const ID_RE = /^\d{3,}$/;

 * 规则:
 *  - 取现有 ID 的最大数值 + 1;
 *  - 位数不足 3 位时前补 0, 超过 3 位自然增长为 4 / 5 位。
 * 这样 ID 稳定、可读、可作为 EdgeOne KV 的 key。
 */

  let max = 0;
  for (const u of users) {
    if (u && typeof u.id === "string" && ID_RE.test(u.id)) {
      const n = parseInt(u.id, 10);
      if (Number.isFinite(n) && n > max) max = n;
    }
  }
  const next = max + 1;
  return String(next).padStart(3, "0");

function sanitizeName(raw) {

  let s = raw.replace(/[\u0000-\u001F\u007F]/g, "").trim();
  if (!s) return "";
  // 折叠内部空白
  s = s.replace(/\s+/g, " ");
  if (s.length > NAME_MAX) s = s.slice(0, NAME_MAX);
  return s;

        if (typeof u.id !== "string" || !ID_RE.test(u.id)) continue;

  NAME_MAX,
  sanitizeName,

  /**
   * 初始化：读取账号库，若没有任何用户则自动创建默认账号 (ID = 001)。
   * 返回 { store, current }

      store.currentId = id;
      saveRaw(store);
    } else if (!store.currentId || !store.users.some((u) => u.id === store.currentId)) {
      // currentId 丢失或指向不存在的用户
      store.currentId = store.users[0].id;
      saveRaw(store);
    }

    return { store, current: store.users.find((u) => u.id === store.currentId) };
  },

  list() { return loadRaw().users.slice().sort((a, b) => b.createdAt - a.createdAt); },

  current() {
    const store = loadRaw();

  },

  /**
   * 创建新用户: ID 由系统按已有列表自动递增分配 (001, 002, ...)。
   * @param {{name:string}} input
   * @returns {{ok:true, user}|{ok:false, error:string}}
   */
  create({ name }) {
    const store = loadRaw();
    const cleanName = sanitizeName(name);
    if (!cleanName) return { ok: false, error: "昵称不能为空" };

    const id = nextId(store.users);
    const user = { id, name: cleanName, createdAt: Date.now() };

  switchTo(id) {

    if (!u) return "用户不存在";
    const cleanName = sanitizeName(name);
    if (!cleanName) return "昵称不能为空";
    u.name = cleanName;

    return null;

   * 删除用户，同时清除其对应的存档 / 快照。
   * 若删除的是当前用户，则自动切换到剩余用户中最近创建的一个；
   * 若删完最后一个用户，则重新初始化一个"访客"账号。
   * 返回新的 currentId。
   */
  remove(id) {

    } catch (_e) { /* ignore */ }

      store.currentId = store.users.length
        ? store.users.slice().sort((a, b) => b.createdAt - a.createdAt)[0].id

    }
    saveRaw(store);

    if (!store.currentId) {
      // 至少保留一个可用账号
      return this.init().current.id;
    }
    return store.currentId;
  },
};

Object.assign(exports, { Account });
};

    osc.start(t);
    osc.stop(t + dur + 0.02);

/**
 * Camera.js — 跟随玩家的摄像机，含屏幕震动与坐标换算。
 */
const {clamp} = require("/Users/fiona/Desktop/neon-survivors/js/utils/math.js");
const {CONFIG} = require("/Users/fiona/Desktop/neon-survivors/js/config.js");

class Camera {
  constructor(viewW, viewH) {
    this.x = 0;
    this.y = 0;
    this.viewW = viewW;
    this.viewH = viewH;
    this.shakeMag = 0;
    this._shakeX = 0;
    this._shakeY = 0;
  }

  resize(w, h) { this.viewW = w; this.viewH = h; }

  /** 触发屏幕震动 */
  shake(mag) { this.shakeMag = Math.max(this.shakeMag, mag); }

  update(target, dt) {
    // 平滑跟随
    const tx = target.x - this.viewW / 2;
    const ty = target.y - this.viewH / 2;
    this.x += (tx - this.x) * Math.min(1, dt * 8);
    this.y += (ty - this.y) * Math.min(1, dt * 8);

    // 限制在世界边界内
    this.x = clamp(this.x, 0, CONFIG.world.width - this.viewW);
    this.y = clamp(this.y, 0, CONFIG.world.height - this.viewH);

    // 震动衰减
    if (this.shakeMag > 0.1) {
      this._shakeX = (Math.random() * 2 - 1) * this.shakeMag;
      this._shakeY = (Math.random() * 2 - 1) * this.shakeMag;
      this.shakeMag -= this.shakeMag * CONFIG.fx.shakeDecay * dt;
    } else {
      this.shakeMag = this._shakeX = this._shakeY = 0;
    }
  }

  /** 在渲染前应用变换 */
  begin(ctx) {
    ctx.save();
    ctx.translate(-this.x + this._shakeX, -this.y + this._shakeY);
  }
  end(ctx) { ctx.restore(); }

  /** 世界坐标 -> 屏幕坐标 */
  toScreen(wx, wy) { return { x: wx - this.x, y: wy - this.y }; }

  /** 某点是否在可视范围内（含外扩边距，用于裁剪渲染） */
  inView(x, y, pad = 60) {
    return x > this.x - pad && x < this.x + this.viewW + pad &&
           y > this.y - pad && y < this.y + this.viewH + pad;
  }
}

Object.assign(exports, { Camera });
};

    const raw = localStorage.getItem(LS_KEY);

    const c = JSON.parse(raw);
    if (c && typeof c.token === "string" && c.token.length >= 16) {

  isLinked() { return !!loadCred(); },

  _openLeaderboard() {
    this.audio.init();
    this.state = GameState.LEADERBOARD;
    this._showPauseBtn(false);
    this.screens.showLeaderboard(() => CloudSync.leaderboard(100), {
      onBack: () => this._showMenu(),
    });
  }

  /**
   * 打开玩家管理界面：切换 / 创建 / 重命名 / 删除。
   * 切换或删除当前用户后会重载存档并回到主菜单。
   */
  _openAccount() {
    this.audio.init();
    this.state = GameState.MENU; // 复用 MENU 状态即可, 不需要单独的 state
    this._showPauseBtn(false);
    const render = () => {
      this.screens.showAccount(this.user.id, {
        onSwitch: (id) => {
          if (Account.switchTo(id)) {
            this._reloadForUser(id);
          }
        },
        onCreate: ({ name }) => {
          const res = Account.create({ name });
          if (!res.ok) return res.error;
          this._reloadForUser(res.user.id);
          return null;
        },
        onRename: (id, name) => {
          const err = Account.rename(id, name);
          if (!err && id === this.user.id) this.user = Account.current();
          if (!err) render(); // 刷新界面显示新昵称
          return err;
        },
        onDelete: (id) => {
          const nextId = Account.remove(id);
          this._reloadForUser(nextId);
        },
        onBack: () => this._showMenu(),
      });
    };
    render();
  }

  /** 切换到指定用户: 重载 save/run, 场上实体清空, 返回菜单 */
  _reloadForUser(userId) {
    // 若在游戏中切换用户, 先落盘并清理场上状态
    this._enemyPool.clear();
    this._projPool.clear();
    this._ebPool.clear();
    this._gemPool.clear();
    this.particles.clear();
    this.bosses = [];
    this.beams.length = 0;

    Account.switchTo(userId); // 幂等: 已是当前则忽略
    this.user = Account.current();
    this.save = SaveData.load(this.user.id);
    this._showMenu();
  }

  /** 打开机库（外观选择 + 抽卡） */
  _openHangar() {
    this.audio.init();
    this.state = GameState.HANGAR;
    this._showPauseBtn(false);
    this.screens.showHangar(this.save, {
      onSelect: (id) => {
        if (Skins.select(this.save, id)) {
          SaveData.save(this.user.id, this.save);
          this.audio.pickup();
        }
        // 无需重建机库: showHangar 内部已做局部 DOM 切换, 避免整页重绘的闪动
      },
      onDraw: (count) => {
        const results = this._drawGacha(count);
        if (results) {
          SaveData.save(this.user.id, this.save);
          this.audio.levelup();
          this.screens.showGachaResult(this.save, results, () => this._openHangar());
        }
      },
      onFreeDraw: () => {
        const res = Skins.freeDraw(this.save);
        if (res) {
          SaveData.save(this.user.id, this.save);
          this.audio.levelup();
          this.screens.showGachaResult(this.save, [res], () => this._openHangar());
        }
      },
      onBack: () => this._showMenu(),
    });
  }

  /**
   * 执行 count 连抽（1 或 10）。校验并扣除棱牌后逐次抽取。
   * 棱牌不足时返回 null（不扣费）。
   */
  _drawGacha(count) {
    const price = count >= 10 ? Skins.priceTen() : Skins.priceSingle();
    if (this.save.skins.shards < price) return null;
    this.save.skins.shards -= price;
    const results = [];
    for (let i = 0; i < count; i++) results.push(Skins.drawOne(this.save));
    return results;
  }

  /** 打开强化实验室（永久升级商店） */
  _openShop() {
    this.audio.init();
    this.state = GameState.SHOP;
    this._showPauseBtn(false);
    this.screens.showShop(this.save, {
      // 购买只改数据 + 落盘, 不重建整页; 界面刷新由 showShop 内部局部完成, 避免闪动
      onBuy: (id) => {
        const ok = MetaProgression.buy(this.save, id);
        if (ok) {
          SaveData.save(this.user.id, this.save);
          this.audio.pickup();
        }
        return ok;
      },
      onBack: () => this._showMenu(),
    });
  }

  /** 触发全屏白闪（演出用） */
  screenFlash(intensity = 0.6) { this.flash = Math.max(this.flash, intensity); }

  /** 触发短暂慢动作 */
  slowmo(scale = 0.35) { this.timeScale = Math.min(this.timeScale, scale); }

  _pause() { this.state = GameState.PAUSED; this._showPauseBtn(false); this._captureRun(); this.screens.showPause(this.player, () => this._resume(), () => this._quitRun()); }
  _resume() { this.screens.clear(); this.state = GameState.PLAYING; this._showPauseBtn(true); }

  /** 主动结束本局：不做奖励结算，清除续玩快照后返回主菜单 */
  _quitRun() {
    this.state = GameState.MENU;
    this._showPauseBtn(false);
    SaveData.clearRun(this.user.id);
    this._showMenu();
  }

  // ---------------- 升级流程 ----------------
  onLevelUp() {
    this.state = GameState.LEVELUP;
    this._showPauseBtn(false);
    this.audio.levelup();
    this._levelChoices = UpgradeSystem.roll(this.player, 3);
    this.screens.showLevelUp(this.player, this._levelChoices, (u) => this._applyUpgrade(u));
  }

  _applyUpgrade(u) {
    UpgradeSystem.apply(u, this.player);
    this.particles.text(this.player.x, this.player.y - 40, u.name, u.accent, 20);
    // 图鉴: 武器解锁项 (id 形如 unlock_xxx) -> 记录到 weapons 分类
    if (u && u.unlock && typeof u.id === "string" && u.id.startsWith("unlock_")) {
      Codex.discover(this.save, "weapons", u.id.slice("unlock_".length));
    }
    this.screens.clear();
    // 优先消耗“战术预载”额外次数，其次是常规经验溢出
    if (this.player.pendingLevels > 0) { this.player.pendingLevels--; this.onLevelUp(); }
    else if (this.player.xp >= this.player.xpToNext) this.onLevelUp();
    else { this.state = GameState.PLAYING; this._showPauseBtn(true); }
  }

  onBossSpawn(boss) {
    const name = (boss && boss.def && boss.def.name) || "母核";
    this.particles.text(this.camera.x + this.viewW / 2, this.camera.y + 80, `⚠ ${name}降临`, (boss && boss.color) || "#ff2bd6", 30);
    this.camera.shake(18);
  }

  // ---------------- 供实体调用的服务方法 ----------------
  spawnEnemy(type, x, y, hpScale) {
    const e = this._enemyPool.obtain();
    if (e) {
      e.spawn(type, x, y, hpScale);
      if (e.isBoss) this.bosses.push(e); // 记录当前 Boss 供血条显示（支持并存多个）
      // 图鉴埋点: 首次遭遇即记录. Boss / 普通分开归类, 界面分区展示.
      Codex.discover(this.save, e.isBoss ? "bosses" : "enemies", type);
    }
    return e;
  }

  spawnProjectile(x, y, vx, vy, opts) {
    const p = this._projPool.obtain();
    if (p) p.spawn(x, y, vx, vy, opts);
  }

  /** 生成敌方弹幕（Boss 攻击用），命中玩家造成伤害 */
  spawnEnemyProjectile(x, y, vx, vy, opts) {
    const b = this._ebPool.obtain();
    if (b) b.spawn(x, y, vx, vy, opts);
  }

  spawnGem(x, y, value, type = DropType.XP) {
    const g = this._gemPool.obtain();
    if (g) g.spawn(x, y, value, type);
    // 图鉴埋点: 记录道具类型（经验晶体除外, 不作为收集条目）
    if (type !== DropType.XP) Codex.discover(this.save, "items", type);
  }

  /** 记录一条瞬时电弧光束（电弧链武器用），由主循环衰减、render 绘制 */
  addBeam(x1, y1, x2, y2, color, life = 0.16) {
    this.beams.push({ x1, y1, x2, y2, color, life, maxLife: life });
  }

  /** 对敌人造成伤害，处理暴击、击杀、掉落、特效 */
  damageEnemy(enemy, amount, showText = true, hx = enemy.x, hy = enemy.y) {
    let crit = false;
    const p = this.player;
    if (p.critChance > 0 && Math.random() < p.critChance) {
      amount *= p.critMult;
      crit = true;
    }
    const dead = enemy.hurt(amount);
    if (showText) this.particles.damageText(hx, hy, amount, amount > 40 || crit);
    this.particles.burst(hx, hy, crit ? "#ff8a3d" : enemy.color, crit ? 7 : 4, crit ? 180 : 120, 2, 0.3);
    if (dead) this._killEnemy(enemy);
    else this.audio.hit();
  }

  _killEnemy(enemy) {
    enemy.active = false;
    this.stats.kills++;
    if (this.player.lifesteal > 0) this.player.heal(this.player.lifesteal);

    if (enemy.isBoss) { this._killBoss(enemy); return; }

    this.audio.kill();
    this.particles.burst(enemy.x, enemy.y, enemy.color, 14, 240, 3, 0.6);

    // 裂解体分裂
    if (enemy.type === "splitter") {
      this.spawnSystem.spawnSplit(enemy.x, enemy.y, this.spawnSystem.hpScale);
    }

    // 掉落经验
    this.spawnGem(enemy.x, enemy.y, enemy.xp, DropType.XP);

    // 概率掉落道具
    const roll = Math.random();
    if (roll < 0.015) {
      this.spawnGem(enemy.x, enemy.y, 0, DropType.HEAL);
    } else if (roll < 0.025) {
      this.spawnGem(enemy.x, enemy.y, 0, DropType.MAGNET);
    } else if (roll < 0.03) {
      this.spawnGem(enemy.x, enemy.y, 0, DropType.BOMB);
    }
  }

  /** Boss 击杀演出：全屏闪白 + 慢动作 + 多波爆发 + 丰厚掉落 + 专属音效 */
  _killBoss(boss) {
    const bi = this.bosses.indexOf(boss);
    if (bi !== -1) this.bosses.splice(bi, 1);
    this.stats.bossKills++;

    // 演出
    this.audio.bossKill();
    this.screenFlash(0.85);
    this.slowmo(0.3);
    this.camera.shake(46);
    this.player.heal(this.player.maxHp * 0.3); // 击杀回血奖励

    // 多波霓虹爆发（以 Boss 本体色主导）
    const colors = [boss.color, "#00f0ff", "#aaff00", "#ffd23f"];
    for (let w = 0; w < 4; w++) {
      const c = colors[w % colors.length];
      this.particles.burst(boss.x, boss.y, c, 36, 200 + w * 160, 5, 1.0 + w * 0.15);
    }
    const bossName = (boss.def && boss.def.name) || "母核";
    this.particles.text(boss.x, boss.y - 40, `${bossName} 净化`, boss.color, 34);
    this.particles.text(boss.x, boss.y + 20, "+30% HP", "#aaff00", 20);

    // 丰厚掉落：环形散布的经验雨 + 必掉强力道具
    const n = 10;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const r = 36;
      this.spawnGem(boss.x + Math.cos(a) * r, boss.y + Math.sin(a) * r, Math.ceil(boss.xp / n), DropType.XP);
    }
    this.spawnGem(boss.x - 30, boss.y, 0, DropType.HEAL);
    this.spawnGem(boss.x + 30, boss.y, 0, DropType.BOMB);
    this.spawnGem(boss.x, boss.y - 30, 0, DropType.MAGNET);
  }

  findNearestEnemy(x, y) {
    let best = null, bestD = Infinity;
    for (const e of this.enemies) {
      const d = Vector2.distSq(e, { x, y });
      if (d < bestD) { bestD = d; best = e; }
    }
    return best;
  }

  /** 查找最近敌人，排除已命中集合并限制最大距离（电弧链跳跃用） */
  findNearestEnemyExcept(x, y, exclude, maxRange) {
    let best = null, bestD = maxRange * maxRange;
    for (const e of this.enemies) {
      if (!e.active || exclude.has(e)) continue;
      const d = Vector2.distSq(e, { x, y });
      if (d <= bestD) { bestD = d; best = e; }
    }
    return best;
  }

  // ---------------- 主循环 ----------------
  loop(now) {
    const rawDt = Math.min(0.05, (now - this._lastTime) / 1000 || 0);
    this._lastTime = now;

    // 游戏逻辑使用缩放后的时间（慢动作演出）
    if (this.state === GameState.PLAYING) this.update(rawDt * this.timeScale);

    // 演出量用真实时间衰减/回归，不受慢动作影响
    if (this.flash > 0) this.flash = Math.max(0, this.flash - rawDt * 2.4);
    if (this.timeScale < 1) this.timeScale = Math.min(1, this.timeScale + rawDt * 1.6);

    // 电弧光束衰减（真实时间）
    if (this.beams.length) {
      for (const b of this.beams) b.life -= rawDt;
      this.beams = this.beams.filter((b) => b.life > 0);
    }

    // 移动端主动技能按钮冷却文本同步（低成本, 每帧调用即可）
    if (this.skillBtn) this._syncSkillBtn();

    this.render();

    requestAnimationFrame((t) => this.loop(t));
  }

  update(dt) {
    this.stats.time += dt;
    this.stats.level = this.player.level;

    // 周期性落盘对局快照（每 4 秒），保证意外关闭也能续玩
    this._runSaveTimer += dt;
    if (this._runSaveTimer >= 4) { this._runSaveTimer = 0; this._captureRun(); }

    // 0) 生成敌人（含难度爬升与 Boss）
    this.spawnSystem.update(dt);
    // 1) 敌人移动与 AI（Boss 攻击需要 game 上下文）
    for (const e of this.enemies) e.update(dt, this.player, this);
    // 2) 重建空间网格（基于本帧敌人位置）
    this.grid.rebuild(this.enemies);
    // 3) 玩家移动与武器（范围武器经网格查询）
    this.player.update(dt, this.input, this);
    // 4) 子弹推进 + 离屏回收
    for (const p of this.projectiles) {
      p.update(dt);
      if (p.active && !this.camera.inView(p.x, p.y, 200)) p.active = false;
    }
    // 4b) 敌方弹幕推进 + 离屏回收
    for (const b of this.enemyProjectiles) {
      b.update(dt);
      if (b.active && !this.camera.inView(b.x, b.y, 200)) b.active = false;
    }
    // 5) 掉落物磁吸
    for (const g of this.gems) g.update(dt, this.player, this.player.pickupRange);
    // 6) 碰撞结算
    this.collisionSystem.update(dt);
    // 7) 特效与相机
    this.particles.update(dt);
    this.camera.update(this.player, dt);

    // 8) 回收失活对象（紧凑活跃列表）
    this._enemyPool.reclaim();
    this._projPool.reclaim();
    this._ebPool.reclaim();
    this._gemPool.reclaim();

    if (!this.player.alive) {
      if (this.player.revives > 0) this._revive();
      else this._gameOver();
    }
  }

  /** 应急重构（局外强化）：阵亡后原地复活一次，清场并短暂无敌 */
  _revive() {
    this.player.revives--;
    this.player.hp = this.player.maxHp;
    this.player.invuln = 3;
    this.screenFlash(0.9);
    this.slowmo(0.35);
    this.camera.shake(40);
    // 净化屏内敌人与弹幕，给玩家喘息
    for (const e of this.enemies) if (e.active && !e.isBoss) this.damageEnemy(e, 99999, false);
    for (const b of this.enemyProjectiles) b.active = false;
    const colors = ["#aaff00", "#00f0ff", "#ffd23f"];
    for (let w = 0; w < 3; w++) this.particles.burst(this.player.x, this.player.y, colors[w], 40, 260 + w * 160, 5, 1.0);
    this.particles.text(this.player.x, this.player.y - 40, "重构完成", "#aaff00", 30);
    this.audio.bossKill();
  }

  _gameOver() {
    this.state = GameState.GAMEOVER;
    this._showPauseBtn(false);
    SaveData.clearRun(this.user.id); // 本局结束，清除续玩快照
    this.audio.gameover();
    this.camera.shake(30);
    this.particles.burst(this.player.x, this.player.y, "#00f0ff", 60, 500, 5, 1.2);

    // 结算货币并刷新历史记录，持久化存档
    const reward = MetaProgression.reward(this.save, this.stats);
    const shardReward = Skins.reward(this.stats); // 本局产出的棱牌 ✦
    const best = this.save.best;
    const records = {
      time: this.stats.time > best.time,
      kills: this.stats.kills > best.kills,
      level: this.stats.level > best.level,
      bossKills: this.stats.bossKills > best.bossKills,
    };
    best.time = Math.max(best.time, this.stats.time);
    best.kills = Math.max(best.kills, this.stats.kills);
    best.level = Math.max(best.level, this.stats.level);
    best.bossKills = Math.max(best.bossKills, this.stats.bossKills);

    this.save.cores += reward;
    this.save.skins.shards += shardReward;
    this.save.totals.runs++;
    this.save.totals.kills += this.stats.kills;
    this.save.totals.bossKills += this.stats.bossKills;
    this.save.totals.cores += reward;
    SaveData.save(this.user.id, this.save);

    // 云同步: 已绑定则后台提交成绩 + 上传存档(fire-and-forget, 失败静默, 不阻塞结算演出)
    if (CloudSync.isLinked()) {
      CloudSync.submitScore({
        time: Math.floor(this.stats.time),
        kills: this.stats.kills,
        bossKills: this.stats.bossKills,
        level: this.stats.level,
      });
      CloudSync.pushSave(this.save);
    }

    setTimeout(() => this.screens.showGameOver(this.stats, { reward, shardReward, records, save: this.save }, {
      onRestart: () => this.start(),
      onShop: () => this._openShop(),
      onHangar: () => this._openHangar(),
      onMenu: () => this._showMenu(),
    }), 700);
  }

  // ---------------- 渲染 ----------------
  render() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.viewW, this.viewH);

    this.camera.begin(ctx);
    this._drawBackground(ctx);

    for (const g of this.gems) if (this.camera.inView(g.x, g.y)) g.render(ctx);
    for (const e of this.enemies) if (this.camera.inView(e.x, e.y)) e.render(ctx);

    // 玩家子弹 / 光束：叠加混合获得霓虹能量质感（批量一次性设置）
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (const p of this.projectiles) p.render(ctx);
    this._drawBeams(ctx);
    ctx.restore();

    // 敌方弹幕：普通混合下绘制实心敌意光球，与玩家能量弹形成鲜明区分
    for (const b of this.enemyProjectiles) b.render(ctx);

    if (this.state !== GameState.MENU) this.player.render(ctx);
    this.particles.render(ctx);
    this.camera.end(ctx);

    // 暗角（屏幕空间，绘制在游戏世界之上、HUD 之下，因此不会压住血条/经验条）
    this._drawVignette(ctx);

    // HUD（屏幕空间）
    if ([GameState.PLAYING, GameState.LEVELUP, GameState.PAUSED].includes(this.state)) {
      this.hud.render(ctx, this);
    }

    // 全屏白闪（演出，屏幕空间，叠加在最上层）
    if (this.flash > 0.001) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, this.flash);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, this.viewW, this.viewH);
      ctx.restore();
    }
  }

  /** 绘制电弧链光束：抖动折线 + 发光，短暂存在 */
  _drawBeams(ctx) {
    for (const b of this.beams) {
      const a = Math.max(0, b.life / b.maxLife);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.strokeStyle = b.color;
      ctx.shadowBlur = 14; ctx.shadowColor = b.color;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(b.x1, b.y1);
      // 沿路径加入几段随机抖动，模拟电弧
      const segs = 5;
      for (let i = 1; i < segs; i++) {
        const t = i / segs;
        const mx = b.x1 + (b.x2 - b.x1) * t;
        const my = b.y1 + (b.y2 - b.y1) * t;
        const j = 9 * a;
        ctx.lineTo(mx + (Math.random() - 0.5) * j, my + (Math.random() - 0.5) * j);
      }
      ctx.lineTo(b.x2, b.y2);
      ctx.stroke();
      ctx.restore();
    }
  }

  /** 屏幕空间暗角（径向渐变），在 HUD 之下绘制 */
  _drawVignette(ctx) {
    const W = this.viewW, H = this.viewH;
    const cx = W / 2, cy = H / 2;
    const inner = Math.min(W, H) * 0.52;
    const outer = Math.hypot(W, H) / 2;
    const g = ctx.createRadialGradient(cx, cy, inner, cx, cy, outer);
    g.addColorStop(0, "rgba(5,6,14,0)");
    g.addColorStop(1, "rgba(5,6,14,0.82)");
    ctx.save();
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

/**
 * Pool.js — 通用对象池。
 * 使用「活跃列表 + 空闲栈 + swap-remove」实现 O(1) 取用与回收，
 * 且迭代时只遍历活跃对象（而非整个池），避免每帧扫描大量闲置槽位。
 */
class Pool {
  /**
   * @param {() => object} factory 创建实例的工厂；实例需含布尔字段 `active`
   * @param {number} size 池容量
   */
  constructor(factory, size) {
    this._items = Array.from({ length: size }, factory);
    this.active = [];                 // 当前活跃对象（供外部迭代）
    this._free = [...this._items];    // 空闲对象栈
  }

  /** 取出一个空闲对象并标记为活跃；池满返回 null */
  obtain() {
    const o = this._free.pop();
    if (!o) return null;
    o.active = true;
    this.active.push(o);
    return o;
  }

  /** 回收所有 active === false 的对象（swap-remove，O(active)） */
  reclaim() {
    const a = this.active;
    for (let i = a.length - 1; i >= 0; i--) {
      if (!a[i].active) {
        const dead = a[i];
        a[i] = a[a.length - 1];
        a.pop();
        this._free.push(dead);
      }
    }
  }

  /** 全部回收 */
  clear() {
    for (const o of this.active) o.active = false;
    this.reclaim();
  }
}

};

 * 每帧调用 rebuild() 重新装填，再用 queryCircle() 查询某点邻域内的对象。
 */
class SpatialGrid {
  constructor(cellSize = 96) {
    this.cellSize = cellSize;
    this.cells = new Map();   // key "cx,cy" -> object[]
    this._epoch = 0;          // 用于 queryCircle 去重
  }

  _key(cx, cy) { return cx * 100003 + cy; }

  rebuild(objects) {
    this.cells.clear();
    const cs = this.cellSize;
    for (const o of objects) {
      const k = this._key(Math.floor(o.x / cs), Math.floor(o.y / cs));
      let arr = this.cells.get(k);
      if (!arr) { arr = []; this.cells.set(k, arr); }
      arr.push(o);
    }
  }

  /**
   * 遍历以 (x,y) 为圆心、半径 r 覆盖到的所有格子内的对象。
   * 通过 epoch 标记保证同一对象在一次查询中只回调一次。
   * @param {(obj:object)=>(boolean|void)} cb 返回 true 可提前终止
   */
  queryCircle(x, y, r, cb) {
    const cs = this.cellSize;
    const minX = Math.floor((x - r) / cs), maxX = Math.floor((x + r) / cs);
    const minY = Math.floor((y - r) / cs), maxY = Math.floor((y + r) / cs);
    const epoch = ++this._epoch;
    for (let cx = minX; cx <= maxX; cx++) {
      for (let cy = minY; cy <= maxY; cy++) {
        const arr = this.cells.get(this._key(cx, cy));
        if (!arr) continue;
        for (const o of arr) {
          if (o._epoch === epoch) continue;
          o._epoch = epoch;
          if (cb(o) === true) return;
        }
      }
    }
  }
}

    if (!target) return;

    const baseAngle = Math.atan2(base.y, base.x);

    this.x += this.vx * dt;
    this.y += this.vy * dt;

  constructor() { this.active = false; }

  spawn(x, y, value, type = DropType.XP) {
    this.x = x; this.y = y;
    this.value = value;
    this.type = type;
    this.attracted = false;
    this.radius = type === DropType.XP ? 6 : 11;
    this.active = true;
    this.t = Math.random() * TAU;
    // 未拾取的掉落物会超时消失：经验较短，珍贵道具较长
    this.life = type === DropType.XP ? 11 : 16;
    this.maxLife = this.life;
  }

  get color() {
    return {
      [DropType.XP]: "#8a5bff",
      [DropType.HEAL]: "#aaff00",
      [DropType.BOMB]: "#ff2bd6",
      [DropType.MAGNET]: "#ffd23f",
    }[this.type];
  }

  update(dt, player, pickupRange) {
    this.t += dt * 3;
    const d = Vector2.dist(this, player);
    if (this.attracted || d < pickupRange) {
      // 已进入磁吸范围：飞向玩家，不再计算过期
      this.attracted = true;

      this.y += dir.y * speed * dt;

      this.life -= dt;
      if (this.life <= 0) { this.active = false; }

  get _alpha() {
    if (this.attracted || this.life >= 3) return 1;
    return 0.3 + 0.7 * Math.abs(Math.sin(this.life * 9));
  }

  }

/**
 * CollisionSystem.js — 碰撞检测系统。
 * 处理：子弹↔敌人、敌人↔玩家、拾取物↔玩家。
 * 子弹↔敌人 经空间网格查询近邻，将复杂度从 O(子弹·敌人) 降到近似 O(子弹)。
 * 采用平方距离比较避免开方，性能友好。
 */
const {CONFIG} = require("/Users/fiona/Desktop/neon-survivors/js/config.js");
const {Vector2} = require("/Users/fiona/Desktop/neon-survivors/js/utils/Vector2.js");
const {DropType} = require("/Users/fiona/Desktop/neon-survivors/js/entities/XPGem.js");

// 网格查询时额外扩展的半径，需覆盖最大敌人半径（湮灭者 Boss=60）
const MAX_ENEMY_RADIUS = 64;

class CollisionSystem {
  constructor(game) {
    this.game = game;
  }

  update(dt) {
    this._projectilesVsEnemies();
    this._enemiesVsPlayer(dt);
    this._enemyBulletsVsPlayer();
    this._pickupsVsPlayer();
  }

  _projectilesVsEnemies() {
    const { projectiles, grid } = this.game;
    for (const p of projectiles) {
      if (!p.active) continue;
      grid.queryCircle(p.x, p.y, p.radius + MAX_ENEMY_RADIUS, (e) => {
        if (!e.active || p.hitSet.has(e)) return;
        const r = p.radius + e.radius;
        if (Vector2.distSq(p, e) <= r * r) {
          this.game.damageEnemy(e, p.damage, true, p.x, p.y);
          p.hitSet.add(e);
          if (p.pierce-- <= 0) { p.active = false; return true; } // 终止本子弹查询
        }
      });
    }
  }

  _enemiesVsPlayer(dt) {
    const { grid, player } = this.game;
    grid.queryCircle(player.x, player.y, player.radius + MAX_ENEMY_RADIUS, (e) => {
      if (!e.active) return;
      const r = e.radius + player.radius;
      if (Vector2.distSq(e, player) <= r * r) {
        player.takeDamage(e.damage, this.game); // 接触伤害（受无敌帧限制）
      }
    });
  }

  /** 敌方弹幕命中玩家 */
  _enemyBulletsVsPlayer() {
    const { enemyProjectiles, player } = this.game;
    for (const b of enemyProjectiles) {
      if (!b.active) continue;
      const r = b.radius + player.radius;
      if (Vector2.distSq(b, player) <= r * r) {
        player.takeDamage(b.damage, this.game);
        b.active = false;
      }
    }
  }

  _pickupsVsPlayer() {
    const { gems, player } = this.game;
    for (const g of gems) {
      if (!g.active) continue;
      const r = g.radius + player.radius;
      if (Vector2.distSq(g, player) <= r * r) {
        this._collect(g);
        g.active = false;
      }
    }
  }

  _collect(g) {
    const game = this.game;
    switch (g.type) {
      case DropType.XP:
        game.player.gainXp(g.value, game);
        game.audio.pickup();
        break;
      case DropType.HEAL:
        game.player.heal(25);
        game.particles.text(game.player.x, game.player.y - 30, "+25 HP", "#aaff00");
        game.audio.pickup();
        break;
      case DropType.MAGNET:
        // 吸附全场经验
        for (const x of game.gems) if (x.active && x.type === DropType.XP) x.attracted = true;
        game.particles.text(game.player.x, game.player.y - 30, "磁吸!", "#ffd23f");
        game.audio.levelup();
        break;
      case DropType.BOMB: {
        // 湮灭：仅对玩家周围一定范围内的敌人造成大量伤害（非全屏）
        const R = CONFIG.items.bombRadius;
        const R2 = R * R;
        game.camera.shake(26);
        game.particles.burst(game.player.x, game.player.y, "#ff2bd6", 60, 500, 4, 0.8);
        game.particles.ring(game.player.x, game.player.y, "#ff2bd6", R, 56, 3.4, 0.55); // 冲击波环：可视化波及范围
        for (const e of game.enemies) {
          if (!e.active) continue;
          if (Vector2.distSq(e, game.player) > R2) continue; // 范围外免疫

          else game.damageEnemy(e, CONFIG.items.bombDamageBoss, false);
        }
        game.particles.text(game.player.x, game.player.y - 30, "湮灭!", "#ff2bd6");
        game.audio.nova();
        break;
      }
    }
  }
}

Object.assign(exports, { CollisionSystem });
};

  }
}

/**

 * 随时间提升难度（缩短间隔、增加数量、提高血量、加入更强敌人），
 * 并按固定周期生成 Boss。

    this.interval = CONFIG.spawn.interval;
    this.batch = CONFIG.spawn.batch;
    this.hpScale = 1;
    this.elapsed = 0;
    this.nextBoss = CONFIG.spawn.bossEvery;
    this.rampTimer = 0;
    this.bossCount = 0;      // 已降临 Boss 数（决定变体与增强轮次）
  }

  /** 根据存活时长决定可生成的敌人种类与权重 */
  _enemyPool() {
    const t = this.elapsed;
    const pool = [{ value: "chaser", weight: 10 }];
    if (t > 20) pool.push({ value: "rusher", weight: 7 });
    if (t > 45) pool.push({ value: "splitter", weight: 5 });
    if (t > 70) pool.push({ value: "tank", weight: 4 });
    return pool;
  }

  update(dt) {
    this.elapsed += dt;
    this.rampTimer += dt;

    // 难度爬升
    if (this.rampTimer >= CONFIG.spawn.rampEvery) {

      this.interval = Math.max(CONFIG.spawn.minInterval, this.interval * 0.88);
      this.hpScale += 0.18;
      if (this.elapsed > 60 && this.batch < 6) this.batch++;
    }

    // Boss 生成
    if (this.elapsed >= this.nextBoss) {
      this.nextBoss += CONFIG.spawn.bossEvery;
      const order = CONFIG.bossOrder;
      const type = order[this.bossCount % order.length];
      const cycle = Math.floor(this.bossCount / order.length); // 每轮完整轮换后进一步增强
      const bossScale = this.hpScale * (1 + cycle * 0.6);
      const boss = this._spawnAt(type, bossScale);
      this.bossCount++;
      this.game.onBossSpawn(boss);

    this.timer -= dt;
    if (this.timer <= 0) {
      this.timer = this.interval;
      const pool = this._enemyPool();
      for (let i = 0; i < this.batch; i++) {
        this._spawnAt(weightedChoice(pool), this.hpScale);
      }

  _spawnAt(type, hpScale) {

    let y = cy + Math.sin(angle) * dist;
    x = Math.max(20, Math.min(CONFIG.world.width - 20, x));

 * 与 Canvas 内的 HUD 分离：DOM 适合处理可交互按钮与卡片，Canvas 负责高频游戏渲染。
 */
const {formatTime} = require("/Users/fiona/Desktop/neon-survivors/js/utils/math.js");
const {UpgradeSystem} = require("/Users/fiona/Desktop/neon-survivors/js/systems/UpgradeSystem.js");
const {MetaProgression} = require("/Users/fiona/Desktop/neon-survivors/js/systems/MetaProgression.js");
const {Skins, RARITY, MAX_STAR} = require("/Users/fiona/Desktop/neon-survivors/js/systems/Skins.js");
const {Codex} = require("/Users/fiona/Desktop/neon-survivors/js/systems/Codex.js");
const {Account} = require("/Users/fiona/Desktop/neon-survivors/js/core/Account.js");

/** HTML 转义：防止用户输入的昵称 / ID 破坏 DOM 结构或注入脚本 */
function esc(str) {
  return String(str).replace(/[&<>"']/g, (c) => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

class Screens {
  constructor(root) {
    this.root = root;
    // 是否为触摸为主的设备（移动端）：用于隐藏键盘相关提示
    this.isTouch = !!(window.matchMedia && window.matchMedia("(pointer: coarse)").matches);
  }

  clear() { this.root.innerHTML = ""; }

  _make(html, extra = "") {
    const div = document.createElement("div");
    div.className = extra ? `screen ${extra}` : "screen";
    div.innerHTML = html;
    return div;
  }

  /** 构建“当前能力总览”面板 HTML（武器 + 被动），用于升级/暂停界面 */
  _loadoutHTML(player, title = "当前装备") {
    const { weapons, passives } = UpgradeSystem.describeLoadout(player);
    const row = (it) => `
      <div class="lo-row">
        <span class="lo-icon" style="color:${it.accent}">${it.icon}</span>
        <span class="lo-name">${it.name}</span>
        <span class="lo-detail">${it.detail}</span>
      </div>`;
    const passiveHTML = passives.length
      ? `<div class="lo-sep">被动强化</div>${passives.map(row).join("")}`
      : "";
    return `
      <div class="loadout">
        <div class="lo-title">${title}</div>
        ${weapons.map(row).join("")}
        ${passiveHTML}
      </div>`;
  }

  /** 主菜单 */
  showMenu(save, user, { onStart, onResume, onShop, onHangar, onCodex, onAccount, onCloud, onLeaderboard }) {
    this.clear();
    const b = save.best;
    const userBar = user
      ? `
      <div class="user-bar" id="user-bar" title="点击切换或管理玩家">
        <span class="user-ic">👤</span>
        <span class="user-name">${esc(user.name)}</span>
        <span class="user-switch">切换 ▸</span>
      </div>`
      : "";
    // 主行按钮:
    //  - 有续玩快照: [继续上局] + [重新开始], 两颗并列
    //  - 无续玩快照: 单独一颗 [开始游戏]
    // 次要行(第二排): 机库 / 强化实验室 / 图鉴
    // 颜色语义:
    //  · 开始游戏 -> 品红 (btn-primary, 与游戏主强调色一致)
    //  · 重新开始 -> 青 (btn-restart, 与"继续上局"区分, 视觉降级)
    //  · 继续上局 -> 品红 (与开始游戏同级, 都是主行动)
    const primaryRow = onResume
      ? `
        <button class="btn btn-primary" id="btn-resume">↩ 继续上局</button>
        <button class="btn btn-restart" id="btn-start">▶ 重新开始</button>
      `
      : `<button class="btn btn-primary" id="btn-start">▶ 开始游戏</button>`;
    const el = this._make(`
      ${userBar}
      <div class="sub">ROGUELITE · SURVIVOR · 霓虹幸存者</div>
      <h1 class="neon-title">NEON DRIFT</h1>
      <div class="cores-balance">
        <span class="cur"><span class="cur-core">◆ ${save.cores}</span> <span class="lbl">暗物质核心</span></span>
        <span class="cur-sep">·</span>
        <span class="cur"><span class="shard-amt">✦ ${save.skins.shards}</span> <span class="lbl">棱牌</span></span>
      </div>
      <div class="best-row">
        <span>最佳存活 <b>${formatTime(b.time)}</b></span>
        <span>最高击杀 <b>${b.kills}</b></span>
        <span>最高等级 <b>${b.level}</b></span>
        <span>击败母核 <b>${b.bossKills}</b></span>
      </div>
      <div class="menu-btns menu-primary">${primaryRow}</div>
      <div class="menu-btns menu-secondary">
        <button class="btn btn-3" id="btn-shop">◆ 强化实验室</button>
        <button class="btn btn-4" id="btn-hangar">✦ 机库</button>
        <button class="btn btn-codex" id="btn-codex">▤ 图鉴</button>
      </div>
      <div class="menu-btns menu-cloud">
        <button class="btn btn-rank" id="btn-rank">🏆 排行榜</button>
        <button class="btn btn-sync" id="btn-cloud">☁ 云同步</button>
      </div>
      <div class="hint">${this.isTouch
        ? "拖动屏幕移动 · 点击右上角按钮暂停<br>武器自动开火"
        : "移动: W A S D / 方向键 &nbsp;·&nbsp; 暂停: P / ESC &nbsp;·&nbsp; 武器自动开火"}</div>
    `, "menu-screen");
    this.root.appendChild(el);
    el.querySelector("#btn-start").addEventListener("click", onStart);
    el.querySelector("#btn-shop").addEventListener("click", onShop);
    el.querySelector("#btn-hangar").addEventListener("click", onHangar);
    if (onCodex) el.querySelector("#btn-codex").addEventListener("click", onCodex);
    if (onResume) el.querySelector("#btn-resume").addEventListener("click", onResume);
    if (onCloud) el.querySelector("#btn-cloud").addEventListener("click", onCloud);
    if (onLeaderboard) el.querySelector("#btn-rank").addEventListener("click", onLeaderboard);
    if (onAccount) {
      const bar = el.querySelector("#user-bar");
      if (bar) bar.addEventListener("click", onAccount);
    }
  }

  /** 强化实验室：花费核心购买永久升级 */
  showShop(save, { onBuy, onBack }) {
    this.clear();
    const el = this._make(`
      <div class="sub">META LAB · 强化实验室</div>
      <h2 class="neon-title">永久强化</h2>
      <div class="cores-balance"><span class="cur-core">◆ <span class="cur-core-amt">${save.cores}</span></span> <span class="lbl">可用核心</span></div>
      <div class="shop-list"></div>
      <button class="btn" id="btn-back">← 返回</button>
      <div class="hint">永久加成在每局开局自动生效 · 失败也在变强</div>
    `, "shop-screen");
    const list = el.querySelector(".shop-list");
    const coreAmtEl = el.querySelector(".cur-core-amt");

    // 按钮态刷新：等级 / 花费 / 是否可购. 用于购买后仅更新受影响 DOM, 避免整页重绘闪动.
    const refreshRow = (row, m) => {
      const lv = MetaProgression.levelOf(save, m.id);
      const cost = MetaProgression.costOf(save, m.id);
      const maxed = cost == null;
      const affordable = !maxed && save.cores >= cost;
      // 等级文本
      const lvEl = row.querySelector(".shop-lv");
      if (lvEl) lvEl.textContent = `Lv.${lv}/${m.max}`;
      // 进度点
      const pipsEl = row.querySelector(".pips");
      if (pipsEl) pipsEl.innerHTML = this._pips(lv, m.max, m.accent);
      // 购买按钮: 只改 class/文本/disabled, 不换 DOM 节点 (监听器保留)
      const btn = row.querySelector(".shop-buy");
      if (btn) {
        btn.classList.toggle("maxed", maxed);
        btn.classList.toggle("poor", !maxed && !affordable);
        btn.disabled = maxed || !affordable;
        btn.textContent = maxed ? "满级" : `◆ ${cost}`;
      }
    };
    const refreshAll = () => {
      if (coreAmtEl) coreAmtEl.textContent = String(save.cores);
      for (const row of list.querySelectorAll(".shop-row")) {
        const id = row.dataset.metaId;
        const m = MetaProgression.list().find((x) => x.id === id);
        if (m) refreshRow(row, m);
      }
    };

    for (const m of MetaProgression.list()) {
      const row = document.createElement("div");
      row.className = "shop-row";
      row.dataset.metaId = m.id;
      row.style.setProperty("--accent", m.accent);
      row.innerHTML = `
        <div class="shop-icon">${m.icon}</div>
        <div class="shop-info">
          <div class="shop-name">${m.name} <span class="shop-lv"></span></div>
          <div class="shop-effect">${m.effect}</div>
          <div class="pips"></div>
        </div>
        <button class="shop-buy" type="button"></button>
      `;
      // 一次性绑定按钮点击, 内部检查是否可购; 购买后局部刷新, 不重建整页.
      row.querySelector(".shop-buy").addEventListener("click", () => {
        if (onBuy(m.id)) refreshAll();
      });
      refreshRow(row, m);
      list.appendChild(row);
    }
    this.root.appendChild(el);
    el.querySelector("#btn-back").addEventListener("click", onBack);
  }

  /** 升级三选一（左侧展示当前能力，右侧三张强化卡） */
  showLevelUp(player, choices, onPick) {
    this.clear();
    const el = this._make(`
      <div class="sub">LEVEL UP · 等级 ${player.level}</div>
      <h2 class="neon-title">选择强化</h2>
      <div class="levelup-body">
        ${this._loadoutHTML(player)}
        <div class="cards"></div>
      </div>
      <div class="hint">${this.isTouch ? "点击卡片选择强化" : "按 1 / 2 / 3 快速选择"}</div>
    `);
    const cardsEl = el.querySelector(".cards");
    choices.forEach((u, i) => {
      const lv = UpgradeSystem.getLevel(player, u.id);
      const isMax = lv + 1 >= u.maxLevel && !u.unlock;
      const card = document.createElement("div");
      card.className = "card";
      card.style.setProperty("--accent", u.accent);
      card.innerHTML = `
        <div class="icon">${u.icon}</div>
        <div class="name">${u.name}</div>
        <div class="lvl">${this.isTouch ? "" : "[" + (i + 1) + "] "}${UpgradeSystem.levelLabel(player, u)}${isMax ? " · 满级" : ""}</div>
        <div class="desc">${u.desc}</div>
        <div class="pips">${this._pips(lv, u.maxLevel, u.accent)}</div>
      `;
      card.addEventListener("click", () => onPick(u));
      cardsEl.appendChild(card);
    });
    this.root.appendChild(el);
  }

  /** 等级进度小圆点 */
  _pips(level, max, accent) {
    let s = "";
    for (let i = 0; i < max; i++) {
      const on = i < level;
      s += `<i class="pip" style="background:${on ? accent : "transparent"};border-color:${accent}"></i>`;
    }
    return s;
  }

  /** 暂停（展示当前能力总览） */
  showPause(player, onResume, onQuit) {
    this.clear();
    const el = this._make(`
      <h2 class="neon-title">已暂停</h2>
      ${this._loadoutHTML(player, "能力总览")}
      <div class="menu-btns">
        <button class="btn" id="btn-resume">继续</button>
        <button class="btn btn-quit" id="btn-quit">✕ 结束本局</button>
      </div>
      <div class="hint">${this.isTouch
        ? "主动结束本局不会有奖励结算"
        : "按 P / ESC 继续 &nbsp;·&nbsp; 主动结束本局不会有奖励结算"}</div>
    `, "pause-screen");
    this.root.appendChild(el);
    el.querySelector("#btn-resume").addEventListener("click", onResume);
    if (onQuit) el.querySelector("#btn-quit").addEventListener("click", onQuit);
  }

  /** 结算 */
  showGameOver(stats, { reward, shardReward, records, save }, { onRestart, onShop, onHangar, onMenu }) {
    this.clear();
    const tag = (on) => (on ? ` <span class="rec">新纪录!</span>` : "");
    const el = this._make(`
      <div class="sub">SIGNAL LOST</div>
      <h1 class="neon-title" style="color:#ff2bd6">GAME OVER</h1>
      <div class="stat-line">存活时间 <b>${formatTime(stats.time)}</b>${tag(records.time)}</div>
      <div class="stat-line">击杀总数 <b>${stats.kills}</b>${tag(records.kills)}</div>
      <div class="stat-line">到达等级 <b>${stats.level}</b>${tag(records.level)}</div>
      <div class="stat-line">击败母核 <b>${stats.bossKills}</b>${tag(records.bossKills)}</div>
      <div class="reward-box">本局获得 <b class="cur-core">◆ ${reward}</b> &nbsp;·&nbsp; <b class="shard-amt">✦ ${shardReward}</b></div>
      <div class="menu-btns">
        <button class="btn" id="btn-restart">↻ 再来一局</button>
        <button class="btn btn-4" id="btn-hangar">✦ 机库</button>
        <button class="btn btn-3" id="btn-shop">◆ 强化实验室</button>
        <button class="btn btn-2" id="btn-menu">主菜单</button>
      </div>
    `);
    this.root.appendChild(el);
    el.querySelector("#btn-restart").addEventListener("click", onRestart);
    el.querySelector("#btn-shop").addEventListener("click", onShop);
    el.querySelector("#btn-hangar").addEventListener("click", onHangar);
    el.querySelector("#btn-menu").addEventListener("click", onMenu);
  }

  // ---------------- 机库（外观选择 + 抽卡） ----------------

  /** 星级显示：●●●○○ */
  _stars(star, max = MAX_STAR) {
    let s = "";
    for (let i = 0; i < max; i++) s += i < star ? "★" : "☆";
    return s;
  }

  /** 渲染单个外观造型到独立 canvas（用于机库卡片预览） */
  _drawSkinPreview(canvas, skin, color) {
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.save();
    ctx.translate(w / 2, h / 2);
    Skins.drawShip(ctx, skin.shape, Math.min(w, h) * 0.3, color);
    ctx.restore();
  }

  /** 机库主界面：外观网格 + 抽卡按钮 */
  showHangar(save, { onSelect, onDraw, onFreeDraw, onBack }) {
    this.clear();
    const shards = save.skins.shards;
    const selected = Skins.selected(save);
    const canFree = Skins.canFreeDraw(save);
    const freeBtn = canFree
      ? `<button class="btn free-draw" id="btn-free">🎁 每日免费抽卡</button>`
      : `<button class="btn free-draw claimed" id="btn-free" disabled>✓ 今日已领取</button>`;
    const el = this._make(`
      <div class="sub">HANGAR · 机库</div>
      <h2 class="neon-title">战机外观</h2>
      <div class="cores-balance"><span class="shard-amt">✦ ${shards}</span> <span class="lbl">棱牌</span></div>
      <div class="gacha-bar">
        ${freeBtn}
        <button class="btn gacha-btn" id="btn-draw1">单抽 · ✦ ${Skins.priceSingle()}</button>
        <button class="btn btn-2 gacha-btn" id="btn-draw10">十连 · ✦ ${Skins.priceTen()}</button>
      </div>
      <div class="skin-grid"></div>
      <button class="btn btn-3" id="btn-back">← 返回</button>
      <div class="hint">每天可免费抽一次 · 重复抽取升星强化专属特性 · 满星后返还棱牌</div>
    `, "hangar-screen");
    const grid = el.querySelector(".skin-grid");
    // 装备切换 -> 只改按钮 textContent + classList, DOM 结构 0 变化.
    // (避免 innerHTML 替换在 backdrop-filter 背板上触发整屏重绘导致的闪动)
    const applyEquipState = (card, isSel) => {
      card.classList.toggle("selected", isSel);
      const btn = card.querySelector(".skin-select");
      if (!btn) return;
      btn.textContent = isSel ? "已装备" : "装备";
      btn.classList.toggle("equipped", isSel);
      btn.disabled = isSel;
    };
    const equipSkin = (skinId) => {
      const next = grid.querySelector(`.skin-card[data-skin-id="${skinId}"]`);
      if (!next || next.classList.contains("selected")) return;
      const prev = grid.querySelector(".skin-card.selected");
      if (prev) applyEquipState(prev, false);
      applyEquipState(next, true);
      onSelect(skinId);
    };
    for (const skin of Skins.list()) {
      const rar = RARITY[skin.rarity];
      const star = Skins.starOf(save, skin.id);
      const owned = star > 0;
      const isSel = owned && skin.id === selected;
      const card = document.createElement("div");
      card.className = `skin-card rar-${skin.rarity}${owned ? "" : " locked"}${isSel ? " selected" : ""}`;
      card.dataset.skinId = skin.id;
      card.style.setProperty("--accent", rar.color);
      const actionHTML = owned
        ? `<button class="skin-select${isSel ? " equipped" : ""}" type="button"${isSel ? " disabled" : ""}>${isSel ? "已装备" : "装备"}</button>`
        : `<span class="skin-lockicon">🔒</span>`;
      card.innerHTML = `
        <div class="skin-rar" style="color:${rar.color}">${rar.name}</div>
        <canvas class="skin-canvas" width="120" height="120"></canvas>
        <div class="skin-name">${owned ? skin.name : "？？？"}</div>
        <div class="skin-stars" style="color:${rar.color}">${owned ? this._stars(star) : this._stars(0)}</div>
        <div class="skin-perk">${owned ? skin.perkText(Math.max(1, star)) : "未解锁 · 抽卡获取"}</div>
        <div class="skin-action">${actionHTML}</div>
      `;
      this._drawSkinPreview(card.querySelector(".skin-canvas"), skin, owned ? skin.accent : "#3a4356");
      if (owned) {
        card.querySelector(".skin-select").addEventListener("click", () => equipSkin(skin.id));
      }
      grid.appendChild(card);
    }
    this.root.appendChild(el);

    const draw1 = el.querySelector("#btn-draw1");
    const draw10 = el.querySelector("#btn-draw10");
    if (shards < Skins.priceSingle()) { draw1.disabled = true; draw1.classList.add("poor"); }
    if (shards < Skins.priceTen()) { draw10.disabled = true; draw10.classList.add("poor"); }
    draw1.addEventListener("click", () => onDraw(1));
    draw10.addEventListener("click", () => onDraw(10));
    if (canFree && onFreeDraw) el.querySelector("#btn-free").addEventListener("click", onFreeDraw);
    el.querySelector("#btn-back").addEventListener("click", onBack);
  }

  /** 抽卡结果展示 */
  showGachaResult(save, results, onClose) {
    this.clear();
    const el = this._make(`
      <div class="sub">SUMMON RESULT</div>
      <h2 class="neon-title">抽卡结果</h2>
      <div class="cores-balance"><span class="shard-amt">✦ ${save.skins.shards}</span> <span class="lbl">棱牌</span></div>
      <div class="gacha-result"></div>
      <button class="btn" id="btn-close">确定</button>
    `);
    const box = el.querySelector(".gacha-result");
    results.forEach((res, i) => {
      const skin = res.skin;
      const rar = RARITY[skin.rarity];
      const cell = document.createElement("div");
      cell.className = `gr-cell rar-${skin.rarity}`;
      cell.style.setProperty("--accent", rar.color);
      cell.style.animationDelay = `${i * 0.05}s`;
      const badge = res.isNew ? `<span class="gr-tag new">NEW</span>`
        : res.upgraded ? `<span class="gr-tag up">升星 ★${res.star}</span>`
        : `<span class="gr-tag refund">返还 ✦${res.refund}</span>`;
      cell.innerHTML = `
        <div class="gr-rar" style="color:${rar.color}">${rar.name}</div>
        <canvas class="gr-canvas" width="96" height="96"></canvas>
        <div class="gr-name">${skin.name}</div>
        ${badge}
      `;
      this._drawSkinPreview(cell.querySelector(".gr-canvas"), skin, skin.accent);
      box.appendChild(cell);
    });
    this.root.appendChild(el);
    el.querySelector("#btn-close").addEventListener("click", onClose);
  }

  // ---------------- 图鉴 ----------------

  /**
   * 图鉴界面: 四类条目网格 + 收集度进度条 + 里程碑奖励条目.
   * 未发掘条目: 黑色轮廓 + 问号占位; 已发掘: 主题色符号 + 名称.
   */
  showCodex(save, { onClaim, onBack }) {
    this.clear();
    const prog = Codex.progress(save);
    const el = this._make(`
      <div class="sub">CODEX · 图鉴</div>
      <h2 class="neon-title">情报库</h2>
      <div class="codex-prog">
        <div class="cp-bar"><div class="cp-fill" style="width:${prog.total ? (prog.owned / prog.total * 100).toFixed(1) : 0}%"></div></div>
        <div class="cp-text">收集进度 <b>${prog.owned}</b> / ${prog.total}</div>
      </div>
      <div class="codex-body"></div>
      <div class="codex-achv-title">
        <span class="cat-tag">ACHIEVEMENTS</span>
        <span class="cat-cn">成就 · 收集里程碑</span>
      </div>
      <div class="codex-milestones"></div>
      <button class="btn btn-3" id="btn-back">← 返回</button>
      <div class="hint">局内首次遭遇即录入图鉴 · 未发掘条目以黑色轮廓显示 · 达成里程碑可领取奖励</div>
    `, "codex-screen");

    const body = el.querySelector(".codex-body");
    for (const cat of Codex.categories()) {
      const items = cat.list();
      const meta = prog.byCategory[cat.key] || { owned: 0, total: items.length };
      const section = document.createElement("div");
      section.className = "codex-section";
      section.innerHTML = `
        <div class="cs-header">
          <div class="cs-title">${cat.title}</div>
          <div class="cs-count">${meta.owned}/${meta.total}</div>
        </div>
        <div class="cs-grid"></div>
      `;
      const grid = section.querySelector(".cs-grid");
      for (const entry of items) {
        const owned = Codex.discovered(save, cat.key, entry.id);

/**
 * Vector2.js — 二维向量工具类（不可变风格的链式运算）
 */
class Vector2 {
  constructor(x = 0, y = 0) {
    this.x = x;
    this.y = y;
  }

  set(x, y) { this.x = x; this.y = y; return this; }
  copy(v) { this.x = v.x; this.y = v.y; return this; }
  clone() { return new Vector2(this.x, this.y); }

  add(v) { this.x += v.x; this.y += v.y; return this; }
  sub(v) { this.x -= v.x; this.y -= v.y; return this; }
  scale(s) { this.x *= s; this.y *= s; return this; }

  get length() { return Math.hypot(this.x, this.y); }
  get lengthSq() { return this.x * this.x + this.y * this.y; }

  normalize() {
    const len = this.length;
    if (len > 1e-6) { this.x /= len; this.y /= len; }
    return this;
  }

  /** 朝目标方向的单位向量 */
  static dir(from, to) {
    return new Vector2(to.x - from.x, to.y - from.y).normalize();
  }

  static dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
  static distSq(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return dx * dx + dy * dy;
  }
}

Object.assign(exports, { Vector2 });
};

 */
const clamp = (v, min, max) => (v < min ? min : v > max ? max : v);

const randInt = (min, max) => Math.floor(rand(min, max + 1));
const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];

function weightedChoice(items) {
  const total = items.reduce((s, i) => s + i.weight, 0);
  let r = Math.random() * total;
  for (const it of items) {
    r -= it.weight;
    if (r <= 0) return it.value;
  }
  return items[items.length - 1].value;
}

/** 格式化为 mm:ss */

  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}
